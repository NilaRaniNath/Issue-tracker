<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issue Tracker</title>

  <!-- Tailwind CSS + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  

  <style>
   

    /* Card top border by status */
    .card-open   { border-top: 3px solid #22c55e; }
    .card-closed { border-top: 3px solid #a855f7; }

    /* Fade-up animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.3s ease both; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2f45;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
  </style>
</head>

<body class="bg-base-300 min-h-screen">

  <!-- ==============================
       NAVBAR
  ============================== -->
  <div class="navbar bg-base-100 shadow-lg sticky top-0 z-50 px-4 lg:px-8">

    <!-- Logo -->
    <div class="flex-1">
      <a class="flex items-center gap-2 text-xl no-underline">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br  flex items-center justify-center text-white text-base">
          <img src="./assets/github-logo.png" alt="">
        </div>
        <span class="logo-text font-extrabold text-base-content">GitHub Issue Tracker</span>
      </a>
    </div>

    <!-- Search bar -->
    <div class="flex-none gap-2 sm:flex">
      <input
        id="search-input"
        type="text"
        placeholder="Search issues…"
        class="input input-bordered input-sm w-64 bg-base-200"
      />
      <button id="search-btn" class="btn btn-primary btn-sm">+ New Issue</button>
    </div>
  </div>




  <main class="max-w-screen-xl mx-auto px-4 lg:px-8 py-6">

  
    <div class="flex gap-2 mb-5">
      <button
        class="tab-btn btn btn-sm btn-primary"
        data-tab="all"
        onclick="switchTab('all')"
      >All</button>

      <button
        class="tab-btn btn btn-sm btn-outline"
        data-tab="open"
        onclick="switchTab('open')"
      >Open</button>

      <button
        class="tab-btn btn btn-sm btn-outline"
        data-tab="closed"
        onclick="switchTab('closed')"
      >Closed</button>
    </div>

  
    <div class="card bg-base-100 shadow mb-6">
      <div class="card-body py-4 px-5 flex-row items-center justify-between flex-wrap gap-3">

      
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg">
            <img src="./assets/Aperture.png" alt="">
          </div>
          <div>
            <p id="issueCount" class="font-bold text-lg logo-text">— Issues</p>
            <p class="text-xs text-base-content/50">Track and manage your project issues</p>
          </div>
        </div>

       
        <div class="flex gap-4 text-sm text-base-content/70">
          <span class="flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span> Open
          </span>
          <span class="flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-purple-500 inline-block"></span> Closed
          </span>
        </div>

      </div>
    </div>

  
    <div
      id="issueGrid"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" >
     
      <div class="col-span-full flex flex-col items-center justify-center py-24 gap-4">
        <div class="spinner"></div>
        <p class="text-base-content/50 text-sm">Loading issues…</p>
      </div>
    </div>

  </main>


  <dialog id="issueModal" class="modal">
    <div class="modal-box max-w-lg">
     
      <div id="modalContent"></div>
    </div>


    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </dialog>



  <script src="issue.js"></script>

</body>
</html>
