<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#F8F9FA] min-h-screen">

    <section id="loginSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 w-full max-w-[450px]">
            <div class="text-center mb-8">
                <div class="flex justify-center mb-4 text-[#1f2328]">
                   <img src="./assets/github-logo.png" alt="">
                </div>
                <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div class="form-control">
                    <label class="label font-bold text-gray-700">Username</label>
                    <input type="text" id="input-name" placeholder="Enter Username" class="input input-bordered w-full" required />
                   
                </div>
                <div class="form-control">
                    <label class="label font-bold text-gray-700">Password</label>
                    <input type="password" id="input-pass" placeholder="Enter Password" class="input input-bordered w-full" required />
                    
                </div>
                <button id="sign-in" type="submit" class="btn bg-[#4F00FF] hover:bg-[#3d00cc] text-white w-full border-none normal-case text-lg">Sign In</button>
            </form>

           
        </div>
    </section>


    <script src="script.js"></script>
</body>
</html>
