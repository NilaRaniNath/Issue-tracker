<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue-Tracker</title>
     <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
     <section id="mainSection" >
        <nav class="bg-white border-b border-gray-200 px-6 py-3 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2 mb-3 md:mb-0">
                <i class="fab fa-github text-2xl"></i>
                <span class="font-bold text-lg">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered input-sm w-full pl-8">
                    <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                </div>
                <button class="btn btn-sm bg-[#4F00FF] hover:bg-[#3d00cc] text-white border-none normal-case">+ New Issue</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
                <div class="flex gap-2 mb-6">
                    <button onclick="allIssue()" id="all-btn" class="btn btn-sm bg-[#4F00FF] text-white border-none px-6">All</button>
                    <button id="open-btn" class="btn btn-sm btn-ghost border border-gray-200 px-6">Open</button>
                    <button id="close-btn" class="btn btn-sm btn-ghost border border-gray-200 px-6">Closed</button>
                </div>
                
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center text-purple-600">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h2 class="font-bold text-xl">50 Issues</h2>
                            <p class="text-sm text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-4 text-sm font-medium">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>
                    </div>
                </div>
            </div>
